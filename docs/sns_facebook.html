<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<title>KG無料経営相談 - Facebook/X OGP</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body { margin: 0; padding: 0; width: 1200px; height: 630px; overflow: hidden; }

  body {
    font-family: 'Noto Sans JP', 'Hiragino Kaku Gothic ProN', 'Yu Gothic', 'Meiryo', sans-serif;
    background: linear-gradient(135deg, #0a1a3a 0%, #0F2350 40%, #162d5e 70%, #1a3568 100%);
    color: #ffffff;
    position: relative;
  }

  /* Subtle background pattern */
  body::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background:
      radial-gradient(circle at 80% 20%, rgba(201, 168, 76, 0.06) 0%, transparent 50%),
      radial-gradient(circle at 20% 80%, rgba(201, 168, 76, 0.04) 0%, transparent 40%);
    pointer-events: none;
  }

  /* Decorative diagonal lines */
  body::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background:
      linear-gradient(120deg, transparent 0%, transparent 48%, rgba(201, 168, 76, 0.03) 48%, rgba(201, 168, 76, 0.03) 52%, transparent 52%, transparent 100%);
    pointer-events: none;
  }

  .container {
    width: 1200px;
    height: 630px;
    position: relative;
    display: flex;
    flex-direction: column;
  }

  .main-content {
    flex: 1;
    display: flex;
    align-items: center;
    padding: 40px 60px 20px 70px;
    position: relative;
    z-index: 1;
  }

  .left-section {
    flex: 1;
    padding-right: 40px;
  }

  /* KG Crest + Org name row */
  .org-row {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 18px;
  }

  .org-crest {
    width: 48px;
    height: 48px;
    flex-shrink: 0;
  }

  .org-crest img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    filter: drop-shadow(0 2px 8px rgba(0,0,0,0.3));
  }

  .org-name-text {
    font-size: 16px;
    font-weight: 700;
    color: rgba(255, 255, 255, 0.8);
    letter-spacing: 3px;
  }

  .title-area {
    margin-bottom: 24px;
  }

  .title-free {
    font-size: 72px;
    font-weight: 900;
    color: #c9a84c;
    letter-spacing: 8px;
    line-height: 1.1;
    text-shadow: 0 2px 20px rgba(201, 168, 76, 0.3);
    display: inline-block;
    position: relative;
  }

  .title-free::after {
    content: '';
    position: absolute;
    bottom: -4px;
    left: 0;
    width: 100%;
    height: 3px;
    background: linear-gradient(90deg, #c9a84c, transparent);
    border-radius: 2px;
  }

  .title-consultation {
    font-size: 72px;
    font-weight: 900;
    color: #ffffff;
    letter-spacing: 6px;
    line-height: 1.2;
    margin-top: 4px;
    text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
  }

  .subtitle {
    font-size: 20px;
    color: rgba(255, 255, 255, 0.85);
    margin-bottom: 28px;
    font-weight: 400;
    letter-spacing: 1px;
    line-height: 1.6;
  }

  .features {
    list-style: none;
  }

  .features li {
    font-size: 19px;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    color: rgba(255, 255, 255, 0.95);
    font-weight: 500;
    letter-spacing: 0.5px;
  }

  .features li .check {
    color: #c9a84c;
    font-size: 18px;
    margin-right: 14px;
    font-weight: 700;
    min-width: 24px;
  }

  .right-section {
    width: 360px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  /* KG Crest as hero visual */
  .crest-hero {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .crest-hero-img {
    width: 220px;
    height: 220px;
    object-fit: contain;
    filter: drop-shadow(0 0 50px rgba(255, 229, 0, 0.3)) drop-shadow(0 0 80px rgba(201, 168, 76, 0.15)) drop-shadow(0 4px 20px rgba(0,0,0,0.3));
    position: relative;
    z-index: 2;
  }

  /* Gold accent badge below crest */
  .free-badge {
    position: absolute;
    bottom: -30px;
    left: 50%;
    transform: translateX(-50%);
    background: linear-gradient(145deg, #c9a84c, #a8873a, #c9a84c);
    color: #0F2350;
    padding: 10px 32px;
    border-radius: 24px;
    font-size: 20px;
    font-weight: 900;
    letter-spacing: 8px;
    box-shadow: 0 4px 20px rgba(201, 168, 76, 0.4);
    z-index: 3;
    white-space: nowrap;
  }

  /* Corner decorations */
  .corner-deco {
    position: absolute;
    width: 50px;
    height: 50px;
    z-index: 1;
  }

  .corner-deco.top-left {
    top: 20px;
    left: 20px;
    border-top: 2px solid rgba(201, 168, 76, 0.3);
    border-left: 2px solid rgba(201, 168, 76, 0.3);
  }

  .corner-deco.top-right {
    top: 20px;
    right: 20px;
    border-top: 2px solid rgba(201, 168, 76, 0.3);
    border-right: 2px solid rgba(201, 168, 76, 0.3);
  }

  .corner-deco.bottom-left {
    bottom: 84px;
    left: 20px;
    border-bottom: 2px solid rgba(201, 168, 76, 0.3);
    border-left: 2px solid rgba(201, 168, 76, 0.3);
  }

  .corner-deco.bottom-right {
    bottom: 84px;
    right: 20px;
    border-bottom: 2px solid rgba(201, 168, 76, 0.3);
    border-right: 2px solid rgba(201, 168, 76, 0.3);
  }

  /* Bottom bar */
  .bottom-bar {
    height: 64px;
    background: linear-gradient(90deg, rgba(201, 168, 76, 0.15), rgba(201, 168, 76, 0.05));
    border-top: 3px solid #c9a84c;
    display: flex;
    align-items: center;
    padding: 0 70px;
    position: relative;
    z-index: 1;
  }

  .bottom-bar .bar-crest {
    width: 36px;
    height: 36px;
    margin-right: 14px;
    flex-shrink: 0;
  }

  .bottom-bar .bar-crest img {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }

  .bottom-bar .org-name {
    font-size: 18px;
    font-weight: 700;
    color: #ffffff;
    letter-spacing: 3px;
  }

  .bottom-bar .org-sub {
    margin-left: auto;
    font-size: 14px;
    font-weight: 500;
    color: rgba(255, 255, 255, 0.5);
    letter-spacing: 1.5px;
  }
</style>
</head>
<body>
  <div class="container">
    <!-- Corner decorations -->
    <div class="corner-deco top-left"></div>
    <div class="corner-deco top-right"></div>
    <div class="corner-deco bottom-left"></div>
    <div class="corner-deco bottom-right"></div>

    <div class="main-content">
      <div class="left-section">
        <div class="org-row">
          <div class="org-crest">
            <img src="../images/kg_crescent.svg" alt="KG">
          </div>
          <div class="org-name-text">関西学院大学</div>
        </div>
        <div class="title-area">
          <div class="title-free">無料</div>
          <div class="title-consultation">経営相談</div>
        </div>
        <div class="subtitle">中小企業の経営課題、一緒に考えます。</div>
        <ul class="features">
          <li><span class="check"><i class="fa-solid fa-check"></i></span>中小企業診断士が対応</li>
          <li><span class="check"><i class="fa-solid fa-check"></i></span>完全無料・秘密厳守</li>
          <li><span class="check"><i class="fa-solid fa-check"></i></span>対面・Zoomで全国対応</li>
        </ul>
      </div>
      <div class="right-section">
        <div class="crest-hero">
          <img class="crest-hero-img" src="../images/kg_crescent.svg" alt="関西学院大学 校章">
          <div class="free-badge">相談無料</div>
        </div>
      </div>
    </div>
    <div class="bottom-bar">
      <div class="bar-crest">
        <img src="../images/kg_crescent.svg" alt="KG">
      </div>
      <span class="org-name">中小企業経営診断研究会</span>
      <span class="org-sub">Kwansei Gakuin University</span>
    </div>
  </div>
</body>
</html>
