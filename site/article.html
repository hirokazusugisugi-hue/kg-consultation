<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>記事 | 関西学院大学 中小企業経営診断研究会</title>
    <meta name="description" id="metaDescription" content="">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&family=Noto+Serif+JP:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <!-- marked.js for Markdown rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>

    <!-- HEADER -->
    <header class="header" id="header">
        <a href="./" class="header-logo">
            <img src="../images/logo.svg" alt="KWANSEI GAKUIN UNIVERSITY" class="header-logo-img">
            <span class="logo-sub">中小企業経営診断研究会</span>
        </a>
        <button class="nav-toggle" aria-label="メニュー"><i class="fas fa-bars"></i></button>
        <nav>
            <ul class="nav-list">
                <li><a href="./">ホーム</a></li>
                <li><a href="about.html">研究会について</a></li>
                <li><a href="members.html">メンバー</a></li>
                <li><a href="articles.html">コラム</a></li>
                <li><a href="news.html">お知らせ</a></li>
                <li class="nav-cta"><a href="contact.html">無料相談</a></li>
            </ul>
        </nav>
    </header>

    <!-- ARTICLE CONTENT -->
    <main>
        <div class="article-content" id="articleContent">
            <div class="loading" style="padding:6rem 0"><i class="fas fa-spinner fa-spin"></i> 記事を読み込み中...</div>
        </div>
    </main>

    <!-- CTA -->
    <section class="cta-banner">
        <div class="container">
            <h2 class="section-title">この記事について相談したい方</h2>
            <p class="section-subtitle">記事の内容に関連する経営課題のご相談も承ります</p>
            <a href="contact.html" class="btn btn-gold">無料相談を申し込む</a>
        </div>
    </section>

    <!-- FOOTER -->
    <footer class="footer">
        <div class="container">
            <div class="footer-inner">
                <div class="footer-brand">
                    <img src="../images/logo.svg" alt="KWANSEI GAKUIN UNIVERSITY" class="footer-logo-img">
                    <p>経営戦略研究科（IBA）研究フォーラム｜中小企業経営診断研究会</p>
                </div>
                <div class="footer-links">
                    <a href="./">ホーム</a>
                    <a href="about.html">研究会について</a>
                    <a href="members.html">メンバー</a>
                    <a href="articles.html">コラム</a>
                    <a href="news.html">お知らせ</a>
                    <a href="contact.html">無料相談</a>
                </div>
            </div>
            <div class="footer-copy">&copy; Kwansei Gakuin University. All Rights Reserved.</div>
        </div>
    </footer>

    <script src="js/main.js"></script>
    <script>
        async function loadArticle() {
            const params = new URLSearchParams(window.location.search);
            const articleId = params.get('id');
            const container = document.getElementById('articleContent');

            if (!articleId) {
                container.innerHTML = '<div style="padding:6rem 0;text-align:center"><p>記事IDが指定されていません</p><a href="articles.html" class="btn btn-outline" style="margin-top:1rem">記事一覧に戻る</a></div>';
                return;
            }

            const data = await fetchAPI('article', { id: articleId });

            if (!data.success || !data.article) {
                container.innerHTML = '<div style="padding:6rem 0;text-align:center"><p>記事が見つかりませんでした</p><a href="articles.html" class="btn btn-outline" style="margin-top:1rem">記事一覧に戻る</a></div>';
                return;
            }

            const article = data.article;

            // Update page title and meta
            document.title = article.title + ' | 関西学院大学 中小企業経営診断研究会';
            document.getElementById('metaDescription').content = article.summary || article.title;

            // Render Markdown
            let bodyHtml = '';
            if (typeof marked !== 'undefined' && article.body) {
                bodyHtml = marked.parse(article.body);
            } else {
                bodyHtml = '<p>' + escapeHTML(article.body || '').replace(/\n/g, '<br>') + '</p>';
            }

            // Tags
            const tags = article.tags ? article.tags.split(/[,、]/).map(t => t.trim()).filter(t => t) : [];

            container.innerHTML = `
                <div style="padding-top:calc(var(--header-height) + 2rem)">
                    <div class="breadcrumb">
                        <a href="./">ホーム</a><span>/</span><a href="articles.html">コラム</a><span>/</span>${escapeHTML(article.title)}
                    </div>
                    <h1>${escapeHTML(article.title)}</h1>
                    <div class="article-meta">
                        <span class="tag">${escapeHTML(article.category || 'COLUMN')}</span>
                        <span><i class="far fa-calendar"></i> ${article.publishDate || ''}</span>
                        ${article.author ? '<span><i class="far fa-user"></i> ' + escapeHTML(article.author) + '</span>' : ''}
                    </div>
                    ${bodyHtml}
                    ${tags.length > 0 ? '<div style="margin-top:2rem;padding-top:1rem;border-top:1px solid var(--border-light)"><div style="display:flex;gap:0.5rem;flex-wrap:wrap">' + tags.map(t => '<span style="font-size:0.75rem;padding:3px 10px;border-radius:100px;background:var(--bg-light);color:var(--text-muted)">#' + escapeHTML(t) + '</span>').join('') + '</div></div>' : ''}
                    <div style="margin-top:2rem;text-align:center">
                        <a href="articles.html" class="btn btn-outline"><i class="fas fa-arrow-left" style="margin-right:0.5rem"></i>記事一覧に戻る</a>
                    </div>
                </div>
            `;
        }

        loadArticle();
    </script>
</body>
</html>
