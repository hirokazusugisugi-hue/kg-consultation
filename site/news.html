<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お知らせ | 関西学院大学 中小企業経営診断研究会</title>
    <meta name="description" content="関西学院大学 中小企業経営診断研究会からのお知らせ一覧です。">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&family=Noto+Serif+JP:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- HEADER -->
    <header class="header" id="header">
        <a href="./" class="header-logo">
            <img src="../images/logo.svg" alt="KWANSEI GAKUIN UNIVERSITY" class="header-logo-img">
            <span class="logo-sub">中小企業経営診断研究会</span>
        </a>
        <button class="nav-toggle" aria-label="メニュー"><i class="fas fa-bars"></i></button>
        <nav>
            <ul class="nav-list">
                <li><a href="./">ホーム</a></li>
                <li><a href="about.html">研究会について</a></li>
                <li><a href="members.html">メンバー</a></li>
                <li><a href="articles.html">コラム</a></li>
                <li><a href="news.html">お知らせ</a></li>
                <li class="nav-cta"><a href="../index14.html#contact">無料相談</a></li>
            </ul>
        </nav>
    </header>

    <!-- PAGE HERO -->
    <section class="page-hero">
        <div class="container">
            <p class="section-label reveal">NEWS</p>
            <h1 class="section-title reveal delay-1">お知らせ</h1>
        </div>
    </section>

    <!-- BREADCRUMB -->
    <div class="container" style="padding-top:1.5rem">
        <div class="breadcrumb">
            <a href="./">ホーム</a><span>/</span>お知らせ
        </div>
    </div>

    <!-- NEWS LIST -->
    <section class="section" style="padding-top:1rem">
        <div class="container-narrow">
            <ul class="news-list" id="newsList">
                <li class="loading"><i class="fas fa-spinner fa-spin"></i> お知らせを読み込み中...</li>
            </ul>
        </div>
    </section>

    <!-- CTA -->
    <section class="cta-banner">
        <div class="container reveal">
            <h2 class="section-title">無料経営相談のお申し込み</h2>
            <p class="section-subtitle">オンライン・対面どちらも対応可能です</p>
            <a href="../index14.html#contact" class="btn btn-gold">相談を申し込む</a>
        </div>
    </section>

    <!-- FOOTER -->
    <footer class="footer">
        <div class="container">
            <div class="footer-inner">
                <div class="footer-brand">
                    <img src="../images/logo.svg" alt="KWANSEI GAKUIN UNIVERSITY" class="footer-logo-img">
                    <p>経営戦略研究科（IBA）研究フォーラム｜中小企業経営診断研究会</p>
                </div>
                <div class="footer-links">
                    <a href="./">ホーム</a>
                    <a href="about.html">研究会について</a>
                    <a href="members.html">メンバー</a>
                    <a href="articles.html">コラム</a>
                    <a href="news.html">お知らせ</a>
                    <a href="../index14.html#contact">無料相談</a>
                </div>
            </div>
            <div class="footer-copy">&copy; Kwansei Gakuin University. All Rights Reserved.</div>
        </div>
    </footer>

    <script src="js/main.js"></script>
    <script>
        async function loadNews() {
            const data = await fetchAPI('news');
            const list = document.getElementById('newsList');

            if (data.success && data.news && data.news.length > 0) {
                list.innerHTML = data.news.map(n => `
                    <li class="news-item reveal">
                        <span class="news-date">${escapeHTML(n.date)}</span>
                        <span class="news-text">${escapeHTML(n.content)}</span>
                    </li>
                `).join('');
                initScrollReveal();
            } else {
                list.innerHTML = '<li style="padding:2rem;text-align:center;color:var(--text-muted)">現在お知らせはありません</li>';
            }
        }

        loadNews();
    </script>
</body>
</html>
