# KG中小企業経営相談システム 改定履歴
# 内部管理用 — 各改定の概要と変更内容を記録

revisions:

  - date: "2026-04-01"
    title: GA4アナリティクス導入（LPアクセス監視）
    summary: >
      無料経営相談LP（iba-consulting.jp）にGA4タグを埋め込み、アクセスを監視できるようにした。
      Looker Studioダッシュボード作成、週次レポートのメール配信設定。
    changes:
      - GA4プロパティ作成（測定ID: G-GELJ4GB33D、KG-IBAアカウント）
      - index15.html にGA4基本タグ＋コンバージョン追跡スクリプト7種埋め込み
      - index.html（リダイレクト元）にもGA4タグ追加
      - 追跡対象：フォーム送信、CTAクリック、外部リンク、スクロール率、滞在時間、FAQ、相談方法選択
      - Looker Studioダッシュボード作成（GA4テンプレートベース）
      - 週次レポート配信設定（毎週火曜20時、PDF形式）
    files:
      - index15.html
      - index.html

  - date: "2026-04-01"
    title: 参加メンバーの絞り込み（担当者自動選定）
    summary: >
      確定時に日程参加表明者ではなく全アクティブメンバーから自動選定する仕組みを導入。
      テーママッチ優先＋ランダムで4名選出→3名確定＋1名予備。
    changes:
      - 確定時に全アクティブメンバー（顧問除く）から自動選定
      - 相談テーマと得意テーマの部分一致マッチング導入
      - 4名選出→3名確定＋1名予備の2段階方式
      - 対面確定（portal.gs）・Zoom自動確定（nda.gs）の両方に適用
      - config.gs に STAFF_LIMITS 設定追加
      - 管理者マニュアル・スタッフマニュアル更新
    files:
      - gas/config.gs
      - gas/members.gs
      - gas/portal.gs
      - gas/nda.gs
      - gas/test_staff_selection.gs
      - docs/manual_admin.html
      - docs/manual_staff.html
      - docs/requirements_staff_selection.md

